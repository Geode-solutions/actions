name: "Test Browser"
description: "Test Browser"

inputs:
  repos:
    type: string
  branch:
    type: string
  tarballs:
    type: string
  pyinstallers:
    type: string
  use_registry:
    type: boolean
    required: true
  token:
    type: string
    required: true
  AZURE_KEY_VAULT_URI:
    type: string
    required: true
  AZURE_CLIENT_ID:
    type: string
    required: true
  AZURE_TENANT_ID:
    type: string
    required: true
  AZURE_CLIENT_SECRET:
    type: string
    required: true
  AZURE_CERT_NAME:
    type: string
    required: true

runs:
  using: "composite"
  steps:
    - name: Install dependencies
      uses: Geode-solutions/actions/install/node-dependencies@master
      with:
        repos: ${{ inputs.repos }}
        branch: ${{ inputs.branch }}
        token: ${{ inputs.token }}
        tarballs: ${{ inputs.tarballs }}
        use_registry: ${{ inputs.use_registry }}
    - name: Install Microservices
      uses: Geode-solutions/actions/install/microservices@master
      with:
        repos: ${{ inputs.repos }}
        branch: ${{ inputs.branch }}
        token: ${{ inputs.token }}
        pyinstallers: ${{ inputs.pyinstallers }}
    - name: Install OSMesa
      uses: Geode-solutions/actions/install/osmesa@master
    - name: Install desktop app
      uses: Geode-solutions/actions/install/desktop@master
      with:
        repo: Geode-solutions/Vease
        branch: ${{ inputs.branch }}
        token: ${{ inputs.token }}
    - name: Install Playwright
      uses: Geode-solutions/actions/install/playwright@master
    - name: Build
      run: |
        npm run package
      shell: bash
    - name: Test
      if: runner.os == 'Linux'
      run: |
        xvfb-run -n 99 --server-args="-screen 0 1280x960x24" npm run test:extension
      shell: bash
      env:
        DESKTOP_EXECUTABLE_PATH: "${{ github.workspace }}/desktop_app"
        DEBUG: "pw:browser"
    - name: Test
      run: |
        npm run test:extension
      shell: bash
      env:
        DESKTOP_EXECUTABLE_PATH: "${{ github.workspace }}/desktop_app"
        DEBUG: "pw:browser"
    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: playwright-${{ inputs.name }}-extension-${{ runner.os }}
        path: playwright-report/
        overwrite: true
