on:
  workflow_call:
    inputs:
      name:
        type: string
        required: true
      directory:
        type: string
        default: "."
      repos:
        type: string
      python:
        type: boolean
        default: true
    secrets:
      TOKEN:
        required: true

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    uses: Geode-solutions/actions/.github/workflows/cpp-prepare.yml@master
    secrets: inherit

  tidy:
    needs: prepare
    runs-on: ubuntu-latest
    container: ghcr.io/geode-solutions/ubuntu:master
    env:
      CC: /usr/bin/clang
      CXX: /usr/bin/clang++
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
      - name: Install dependencies
        uses: Geode-solutions/actions/install/cpp-dependencies@master
        id: repos
        with:
          repos: ${{ inputs.repos }}
          token: ${{ secrets.TOKEN }}
          branch: ${{ github.event.pull_request.head.ref }}
          system: ubuntu
      - name: Configure
        run: |
          echo "base_dir=$(pwd)" >> $GITHUB_ENV
          mkdir -p build
          cd build
          cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Debug -DCMAKE_PREFIX_PATH="${{ steps.repos.outputs.path }}" ..
          cmake --build . -t third_party -j 2
      - uses: cpp-linter/cpp-linter-action@v2
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          style: ""
          tidy-checks: ""
          tidy-review: true
          thread-comments: update
          step-summary: true
          no-lgtm: false
          database: build/${{ inputs.directory }}
      - name: Fail fast?!
        if: steps.linter.outputs.checks-failed > 0
        run: exit 1

  test-repository:
    needs: prepare
    uses: Geode-solutions/actions/.github/workflows/cpp-test-repository.yml@master
    with:
      name: ${{ inputs.name }}
      directory: ${{ inputs.directory }}
      repos: ${{ inputs.repos }}
      light: ${{ github.event.pull_request.draft }}
      branch: ${{ github.event.pull_request.head.ref }}
      python: ${{ inputs.python }}
    secrets: inherit

  semantic-commit:
    needs: prepare
    uses: Geode-solutions/actions/.github/workflows/semantic-commit.yml@master
    secrets: inherit

  release:
    needs: [test-repository, semantic-commit]
    uses: Geode-solutions/actions/.github/workflows/dev-release.yml@master

  deploy-repository:
    needs: release
    uses: Geode-solutions/actions/.github/workflows/cpp-deploy-repository.yml@master
    with:
      name: ${{ inputs.name }}
      directory: ${{ inputs.directory }}
      repos: ${{ inputs.repos }}
      version: "0.0.0"
      release: ${{ github.head_ref }}-tag
      upload-pypi: false
      light: true
      python: ${{ inputs.python }}
    secrets: inherit
