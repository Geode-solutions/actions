name: "Test Cloud"
description: "Test Cloud"

inputs:
  name:
    type: string
    default: "results"
  repos:
    type: string
  branch:
    type: string
  use_registry:
    type: boolean
    required: true
  email:
    type: string
    required: true
  password:
    type: string
    required: true
  token:
    type: string
    required: true

runs:
  using: "composite"
  steps:
    - name: Install dependencies
      uses: Geode-solutions/actions/install/node-dependencies@master
      with:
        repos: ${{ inputs.repos }}
        branch: ${{ inputs.branch }}
        token: ${{ inputs.token }}
        use_registry: true
    - name: Install Playwright
      uses: Geode-solutions/actions/install/playwright@master
    - name: Test on Cloud
      run: |
        npm run test:e2e:cloud
      shell: bash
      env:
        DEBUG: "pw:browser"
        GEODE_USER_EMAIL: ${{ inputs.email }}
        GEODE_USER_PASSWORD: ${{ inputs.password }}
    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: playwright-${{ inputs.name }}-cloud-${{ runner.os }}
        path: playwright-report/
        overwrite: true
