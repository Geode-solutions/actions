on:
  workflow_call:
    inputs:
      repos:
        type: string
    secrets:
      TOKEN:
        required: true

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  config:
    uses: Geode-solutions/actions/.github/workflows/js-config.yml@master
    secrets: inherit

  prepare:
    needs: config
    uses: Geode-solutions/actions/.github/workflows/js-prepare.yml@master
    secrets: inherit

  oxlint:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: Geode-solutions/actions/install/checkout@master
        with:
          token: ${{ secrets.TOKEN }}
      - name: Oxlint
        run: npx oxlint@latest --no-error-on-unmatched-pattern --config .oxlintrc.json --format github
      # - uses: oxc-project/oxlint-action@latest
      #   with:
      #     config: .oxlintrc.json
      #     all-files: true

  test-repository:
    needs: [prepare, config]
    uses: Geode-solutions/actions/.github/workflows/web-test-repository.yml@master
    with:
      repos: ${{ inputs.repos }}
      branch: ${{ github.event.pull_request.head.ref }}
      docker: false
      python: false
      pyinstaller: false
      node: ${{ needs.config.outputs.node }}
      integration: ${{ needs.config.outputs.integration }}
      browser: ${{ needs.config.outputs.browser }}
      desktop: ${{ needs.config.outputs.desktop }}
      extension: ${{ needs.config.outputs.extension }}
      cloud: false
    secrets: inherit

  semantic-commit:
    needs: prepare
    uses: Geode-solutions/actions/.github/workflows/semantic-commit.yml@master
    secrets: inherit

  release:
    needs: [test-repository, semantic-commit, oxlint]
    uses: Geode-solutions/actions/.github/workflows/dev-release.yml@master

  deploy-repository:
    needs: [release, config]
    uses: Geode-solutions/actions/.github/workflows/web-deploy-repository.yml@master
    with:
      repos: ${{ inputs.repos }}
      branch: ${{ github.event.pull_request.head.ref }}
      version: "0.0.0"
      release: ${{ github.head_ref }}-tag
      release_channel: ${{ needs.release.outputs.new_release_channel }}
      upload: false
      python: false
      pyinstaller: false
      extension: ${{ needs.config.outputs.extension }}
      docker: false
      cloud: false
      node: ${{ needs.config.outputs.node }}
      desktop: ${{ needs.config.outputs.desktop }}
    secrets: inherit
