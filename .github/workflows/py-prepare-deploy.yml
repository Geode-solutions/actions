on:
  workflow_call:
    secrets:
      TOKEN:
        required: true

jobs:
  semantic-release:
    uses: Geode-solutions/actions/.github/workflows/release.yml@master
    with:
      dry_run: true
    secrets: inherit

  sleep:
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for registry to update
        run: sleep 1m

  prepare:
    needs: sleep
    uses: Geode-solutions/actions/.github/workflows/py-prepare.yml@master
    with:
      use_internal: true
    secrets: inherit
