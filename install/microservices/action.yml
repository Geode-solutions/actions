name: "Install microservices"
description: "Install microservices dependencies"

inputs:
  repos:
    type: string
    required: true
  branch:
    type: string
    required: true
  pyinstallers:
    type: string
  token:
    type: string
    required: true

runs:
  using: "composite"
  steps:
    - name: Python setup
      uses: actions/setup-python@v5
      with:
        python-version: 3.12
    - uses: Geode-solutions/actions/get-release@master
      if: ${{ inputs.pyinstallers == '' }}
      id: pyinstallers
      with:
        repository: ${{ inputs.repos }}
        file: "pyinstaller-${{ runner.os }}.zip"
        token: ${{ inputs.token }}
        branch: ${{ inputs.branch }}
    - name: Get pyinstallers
      id: result
      run: |
        if [ -n "${{ inputs.pyinstallers }}" ]; then
          echo "pyinstallers=${{ inputs.pyinstallers }}" >> $GITHUB_OUTPUT
        elif [ -n "${{ steps.pyinstallers.outputs.path }}" ]; then
          echo "pyinstallers=${{ steps.pyinstallers.outputs.path }}" >> $GITHUB_OUTPUT
        else
          echo "pyinstallers=" >> $GITHUB_OUTPUT
        fi
        ls -l
      shell: bash
