name: "Install microservices"
description: "Install microservices dependencies"

inputs:
  repos:
    type: string
    required: true
  branch:
    type: string
    required: true
  wheels:
    type: string
  microservices:
    type: string
    required: true
  use_registry:
    type: boolean
    required: true
  token:
    type: string
    required: true

runs:
  using: "composite"
  steps:
    - name: Python setup
      uses: actions/setup-python@v5
      with:
        python-version: 3.12
    - uses: Geode-solutions/actions/get-release@master
      if: ${{ inputs.wheels == '' && inputs.use_registry == 'false' }}
      id: pyinstaller
      with:
        repository: ${{ inputs.repos }}
        file: "${{ runner.os }}.zip"
        token: ${{ inputs.token }}
        branch: ${{ inputs.branch }}
    - name: Get wheels
      id: result
      run: |
        if [ -n "${{ inputs.wheels }}" ]; then
          echo "wheels=${{ inputs.wheels }}" >> $GITHUB_OUTPUT
        elif [ -n "${{ steps.wheels.outputs.path }}" ]; then
          echo "wheels=${{ steps.wheels.outputs.path }}" >> $GITHUB_OUTPUT
        else
          echo "wheels=" >> $GITHUB_OUTPUT
        fi
      shell: bash
    - name: Install OSMesa
      uses: Geode-solutions/actions/install/osmesa@master
    - name: Install microservices
      run: |
        while IFS= read -r -d '' zipfile; do
          ((count++))
          filename=$(basename "$zipfile")
          echo "Extracting: $filename"
          unzip -o -q "$zipfile"
        done < <(find . -maxdepth 1 -type f -iname "*.zip" -print0)
        ls
      shell: bash
